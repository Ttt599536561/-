<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心动课表 — 和 TA 的时间，一眼就懂</title>
  <style>
    :root {
      --pink: #FF6B9D;
      --pink3: #FFB3C6;
      --purple: #C77DFF;
      --purple2: #9B5DE5;
      --peach: #FFD6A5;
      --mint: #A8DADC;
      --yellow: #FFE66D;
      --dark: #1A1A2E;
      --text: #F0F0F0;
      --muted: rgba(255,255,255,0.55);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--dark); color: var(--text); overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 6vw; height: 64px;
      backdrop-filter: blur(18px);
      background: rgba(26,26,46,0.82);
      border-bottom: 1px solid rgba(255,107,157,0.18);
    }
    .nav-logo {
      font-size: 1.2rem; font-weight: 900;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: .875rem; transition: color .2s; }
    .nav-links a:hover { color: var(--pink); }
    .nav-cta {
      background: linear-gradient(135deg, var(--pink), var(--purple2));
      color: #fff; border: none; border-radius: 50px;
      padding: .45rem 1.3rem; font-size: .875rem; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-block;
      transition: transform .15s, box-shadow .15s;
    }
    .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,157,.4); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 120px 6vw 80px;
      position: relative; overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: .3;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .blob-1 { width: 600px; height: 600px; background: var(--pink); top: -150px; left: -180px; }
    .blob-2 { width: 500px; height: 500px; background: var(--purple); bottom: -100px; right: -120px; animation-delay: -5s; }
    .blob-3 { width: 320px; height: 320px; background: var(--peach); top: 45%; left: 38%; animation-delay: -9s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to { transform: translate(50px,35px) scale(1.15); }
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(255,107,157,.12);
      border: 1px solid rgba(255,107,157,.35);
      border-radius: 50px; padding: .3rem 1rem;
      font-size: .8rem; color: var(--pink3);
      margin-bottom: 1.6rem; position: relative; z-index: 1;
    }
    .hero-title {
      font-size: clamp(2.6rem, 8vw, 5.5rem);
      font-weight: 900; line-height: 1.1; letter-spacing: -.02em;
      margin-bottom: 1.2rem; position: relative; z-index: 1;
    }
    .hero-title .grad {
      background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 55%, var(--peach) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      color: var(--muted); max-width: 520px; line-height: 1.75;
      margin-bottom: 2.5rem; position: relative; z-index: 1;
    }
    .hero-btns {
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
      margin-bottom: 4rem; position: relative; z-index: 1;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--purple2));
      color: #fff; border: none; border-radius: 50px;
      padding: .9rem 2.4rem; font-size: 1rem; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-block;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(255,107,157,.45); }
    .btn-secondary {
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.2);
      color: var(--text); border-radius: 50px;
      padding: .9rem 2.4rem; font-size: 1rem; font-weight: 600;
      cursor: pointer; text-decoration: none; display: inline-block;
      transition: background .2s, border-color .2s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,.1); border-color: var(--pink); }

    /* PHONE MOCKUP */
    .hero-phone { position: relative; z-index: 1; width: min(300px, 78vw); }
    .phone-frame {
      background: linear-gradient(160deg,#1e2a4a,#0d1b2a);
      border: 2px solid rgba(255,255,255,.12);
      border-radius: 40px; padding: 12px;
      box-shadow: 0 40px 80px rgba(0,0,0,.6);
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }
    .phone-screen {
      background: linear-gradient(160deg,#0f1b35,#1a0a2e);
      border-radius: 30px; overflow: hidden;
      padding: 18px 14px 22px; min-height: 500px;
    }
    .phone-statusbar {
      display: flex; justify-content: space-between;
      font-size: .6rem; color: rgba(255,255,255,.4);
      margin-bottom: 14px;
    }
    .phone-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .phone-title-text { font-size: .85rem; font-weight: 800; }
    .phone-week-tag {
      background: rgba(255,107,157,.18);
      border: 1px solid rgba(255,107,157,.35);
      border-radius: 20px; padding: .2rem .55rem;
      font-size: .6rem; color: var(--pink);
    }
    .tab-row { display: flex; gap: 5px; margin-bottom: 12px; }
    .tab-item {
      flex: 1; text-align: center; font-size: .6rem; padding: .28rem 0;
      border-radius: 20px; border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.4);
    }
    .tab-item.active {
      background: linear-gradient(135deg,var(--pink),var(--purple2));
      border-color: transparent; color: #fff; font-weight: 700;
    }
    .phone-grid {
      display: grid;
      grid-template-columns: 20px repeat(5,1fr);
      gap: 2px;
    }
    .pg-head { text-align: center; color: rgba(255,255,255,.3); font-size: .5rem; padding: 2px 0; }
    .pg-time { color: rgba(255,255,255,.22); font-size: .48rem; text-align: right; padding: 4px 3px 0 0; }
    .pg-cell { border-radius: 5px; min-height: 32px; position: relative; }
    .pg-cell.mine { background: linear-gradient(135deg,#FF6B9D,#C77DFF); }
    .pg-cell.hers { background: linear-gradient(135deg,#A8DADC,#56CFE1); opacity: .9; }
    .pg-cell.free { background: rgba(255,230,109,.1); border: 1px dashed rgba(255,230,109,.4); }
    .pg-cell.event { background: linear-gradient(135deg,#FFD6A5,#FF9A3C); }
    .pg-cell.empty { background: rgba(255,255,255,.03); }
    .pg-label {
      position: absolute; inset: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: .46rem; font-weight: 600;
      color: rgba(255,255,255,.9); text-align: center; line-height: 1.2;
    }
    .phone-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
    .ptag { border-radius: 20px; padding: .18rem .5rem; font-size: .56rem; font-weight: 600; }
    .ptag.p { background: rgba(255,107,157,.2); color: var(--pink); }
    .ptag.b { background: rgba(168,218,220,.2); color: var(--mint); }
    .ptag.y { background: rgba(255,230,109,.2); color: var(--yellow); }
    .ptag.o { background: rgba(255,214,165,.2); color: var(--peach); }

    /* STATS */
    .stats-row {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 3rem; padding: 2rem 6vw 5rem;
      position: relative; z-index: 1;
    }
    .stat-item { text-align: center; }
    .stat-num {
      font-size: 2.6rem; font-weight: 900;
      background: linear-gradient(135deg,var(--pink),var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-label { font-size: .78rem; color: var(--muted); margin-top: .3rem; }

    /* SECTIONS */
    section { padding: 6rem 6vw; position: relative; }
    .section-label {
      display: inline-block; font-size: .72rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--pink); margin-bottom: .7rem;
    }
    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900; line-height: 1.15; margin-bottom: 1rem;
    }
    .section-sub {
      font-size: 1rem; color: var(--muted);
      max-width: 480px; line-height: 1.75; margin-bottom: 3rem;
    }
    .center { text-align: center; }
    .center .section-sub { margin: 0 auto 3rem; }

    /* FEATURES GRID */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
      gap: 1.4rem;
    }
    .feat-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 20px; padding: 1.8rem;
      transition: transform .2s, border-color .2s, background .2s;
    }
    .feat-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,107,157,.4);
      background: rgba(255,107,157,.05);
    }
    .feat-icon {
      width: 50px; height: 50px; border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 1.1rem;
    }
    .feat-icon.pink   { background: rgba(255,107,157,.18); }
    .feat-icon.purple { background: rgba(199,125,255,.18); }
    .feat-icon.mint   { background: rgba(168,218,220,.18); }
    .feat-icon.yellow { background: rgba(255,230,109,.18); }
    .feat-icon.peach  { background: rgba(255,214,165,.18); }
    .feat-icon.blue   { background: rgba(86,207,225,.18); }
    .feat-title { font-size: 1rem; font-weight: 800; margin-bottom: .5rem; }
    .feat-desc { font-size: .86rem; color: var(--muted); line-height: 1.65; }

    /* HOW IT WORKS */
    .steps { display: flex; flex-direction: column; max-width: 660px; margin: 0 auto; }
    .step {
      display: flex; gap: 2rem; align-items: flex-start;
      padding: 2rem 0; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .step:last-child { border-bottom: none; }
    .step-num {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 900;
      background: linear-gradient(135deg,var(--pink),var(--purple2));
      box-shadow: 0 6px 20px rgba(255,107,157,.35);
    }
    .step-content h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: .4rem; }
    .step-content p { font-size: .88rem; color: var(--muted); line-height: 1.65; }

    .couple-demo {
      background:
